name: CI/CD

on:
  push:
    branches:
      - main
      - ft/*
      - hf/*
      - v11
      - "!post/**"
    paths-ignore:
      - "docs/**/*"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: azure-static-web-apps-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Run Playwright Tests
        run: |
          npx playwright install --with-deps
          npx playwright test --reporter=html
        env:
          CI: true

      - name: Upload Playwright Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-report
          path: playwright-report/
          if-no-files-found: error

      - name: Add Playwright Report to Job Summary
        if: always()
        run: |
          echo "## Playwright Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[Download the HTML report artifact](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts)" >> $GITHUB_STEP_SUMMARY

      - name: Upload Site Files as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: _site/
          if-no-files-found: error
          retention-days: 1

  deploy:
    if: github.event_name == 'push' && github.ref_name == 'main'
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download Site Files
        uses: actions/download-artifact@v4
        with:
          name: site
          path: _site

      - name: Install OIDC Client from Core Package
        run: npm install @actions/core@1.6.0 @actions/http-client

      - name: Get Id Token
        uses: actions/github-script@v7
        id: idtoken
        with:
          script: |
            const core = require("@actions/core");
            return await core.getIDToken();
          result-encoding: string

      - name: Deploy to Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GRAY_SMOKE_09B0C160F }}
          action: upload
          app_location: _site
          api_location: ""
          skip_app_build: true
          github_id_token: ${{ steps.idtoken.outputs.result }}
